status = warn
dest = err
name = PropertiesConfig

appender.console.type = Console
appender.console.target = SYSTEM_ERR
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{ISO8601} %-5p [%t] %C{2}(%L): %m%n

rootLogger.level = debug
rootLogger.appenderRef.stdout.ref = Console

# Silence chatty third-party libraries that would otherwise drown the test output
# at TRACE level. We keep our own packages at TRACE to preserve the deep tracing
# instrumentation in the consensus codebase.
logger.netty.name = io.netty
logger.netty.level = info
logger.thrift.name = org.apache.thrift
logger.thrift.level = info
logger.hadoop.name = org.apache.hadoop.metrics2
logger.hadoop.level = info
