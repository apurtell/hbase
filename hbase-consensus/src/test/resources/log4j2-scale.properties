# log4j2 configuration used exclusively by dev-support/run-scale-tests.sh when running
# TestConsensusServerScale. Mirrors the production HBase RegionServer logging level (INFO) so the
# in-JVM 3-server fixture's measured tail latency is not skewed by synchronized-appender lock
# contention from per-message LOG.debug(...) calls in the heartbeat / replicate hot paths.
#
# The default test log4j2.properties sets rootLogger.level=debug for diagnostic richness in
# functional tests. At the scale exercised here (tens of thousands of inbound LeaderHeartbeat /
# AppendEntriesResponse messages per second) that debug volume is itself a global serialization
# point that does not exist in production deployments and was the dominant lock-contention source
# in the g2000 cell at drivers=4 (see RAFT_SCALE_P99_DEEP_DIVE.md, lock profile).
#
# Activated via -Dlog4j2.configurationFile=log4j2-scale.properties at the test JVM, plumbed by
# dev-support/run-scale-tests.sh and the consensusScaleProfile Maven profile.

status = warn
dest = err
name = ScalePropertiesConfig

appender.console.type = Console
appender.console.target = SYSTEM_ERR
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{ISO8601} %-5p [%t] %C{2}(%L): %m%n

rootLogger.level = info
rootLogger.appenderRef.stdout.ref = Console

# Match the production-default log levels for chatty third-party libraries.
logger.netty.name = io.netty
logger.netty.level = info
logger.thrift.name = org.apache.thrift
logger.thrift.level = info
logger.hadoop.name = org.apache.hadoop.metrics2
logger.hadoop.level = info
