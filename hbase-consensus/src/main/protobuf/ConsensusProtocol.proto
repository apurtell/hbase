syntax = "proto2";
package hbase.consensus.pb;
option java_package = "org.apache.hadoop.hbase.consensus.protobuf.generated";
option java_outer_classname = "ConsensusProtos";
option java_generate_equals_and_hash = true;
option optimize_for = SPEED;

message RaftEndpointPB {
  optional bytes id = 1;
}

message LogEntryPB {
  optional int64 index = 1;
  optional int32 term = 2;
  optional int32 op_type = 3;
  optional int32 op_payload_compression = 4;
  optional bytes op_payload = 5;
}

message RaftGroupMembersViewPB {
  optional int64 log_index = 1;
  repeated RaftEndpointPB members = 2;
  repeated RaftEndpointPB voting_members = 3;
}

message SnapshotChunkPB {
  optional int64 index = 1;
  optional int32 term = 2;
  optional int32 chunk_index = 3;
  optional int32 chunk_count = 4;
  optional RaftGroupMembersViewPB members_view = 5;
  optional bytes payload = 6;
}

// Wire form of an UpdateRaftGroupMembersOp. Carried as the LogEntryPB.op_payload
// when the consensus core replicates a membership change.
message UpdateRaftGroupMembersOpPB {
  enum ChangeMode {
    ADD_LEARNER                = 1;
    ADD_OR_PROMOTE_TO_FOLLOWER = 2;
    REMOVE_MEMBER              = 3;
  }
  repeated RaftEndpointPB members = 1;
  repeated RaftEndpointPB voting_members = 2;
  optional RaftEndpointPB endpoint = 3;
  optional ChangeMode mode = 4;
}

// Per-group payloads (envelope-bundled below)
message GroupAppendEntriesPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int32 prev_log_term = 4;
  optional int64 prev_log_index = 5;
  optional int64 commit_index = 6;
  repeated LogEntryPB entries = 7;
  optional int64 query_seq = 8;
  optional int64 flow_control_seq = 9;
}

// Per-group entry inside a BulkHeartbeatPB envelope. The sender endpoint is
// carried at envelope level so it is not duplicated per entry.
message GroupBulkHeartbeatPB {
  optional bytes group_id = 1;
  optional int32 term = 2;
  optional int64 commit_index = 3;
  optional bool  quiesced = 4;
}

// Per-group acknowledgement entry inside a BulkHeartbeatAckPB envelope.
// last_verified_log_index lets the leader detect when a follower's runtime
// verification state lags its persisted log so the leader can fire a
// catch-up AppendEntries.
message GroupBulkHeartbeatAckPB {
  optional bytes group_id = 1;
  optional int32 term = 2;
  optional int64 last_verified_log_index = 3;
}

message GroupAppendSuccessPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int64 last_log_index = 4;
  optional int64 query_seq = 5;
  optional int64 flow_control_seq = 6;
}

message GroupAppendFailurePB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int64 expected_next_index = 4;
  optional int64 query_seq = 5;
  optional int64 flow_control_seq = 6;
}

message InstallSnapshotRequestPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional bool sender_leader = 4;
  optional int32 snapshot_term = 5;
  optional int64 snapshot_index = 6;
  optional int32 total_snapshot_chunk_count = 7;
  optional SnapshotChunkPB snapshot_chunk = 8;
  repeated RaftEndpointPB snapshotted_members = 9;
  optional RaftGroupMembersViewPB group_members_view = 10;
  optional int64 query_seq = 11;
  optional int64 flow_control_seq = 12;
}

message InstallSnapshotResponsePB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int64 snapshot_index = 4;
  optional int32 requested_snapshot_chunk_index = 5;
  optional int64 query_seq = 6;
  optional int64 flow_control_seq = 7;
}

message VoteRequestPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int32 last_log_term = 4;
  optional int64 last_log_index = 5;
  optional bool sticky = 6;
}

message VoteResponsePB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional bool granted = 4;
}

message PreVoteRequestPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int32 last_log_term = 4;
  optional int64 last_log_index = 5;
}

message PreVoteResponsePB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional bool granted = 4;
}

message TriggerLeaderElectionPB {
  optional bytes group_id = 1;
  optional RaftEndpointPB sender = 2;
  optional int32 term = 3;
  optional int32 last_log_term = 4;
  optional int64 last_log_index = 5;
}

// Coalescing batch for AppendEntries. One envelope can carry many groups'
// append messages bound for the same peer.
message BatchAppendEntriesPB {
  repeated GroupAppendEntriesPB groups = 1;
}

// Bulk heartbeat envelope. One frame per (sender, peer) per heartbeat tick
// carries one per-group entry for every local leader group whose committed
// membership includes the target peer. Top-level sender / epoch / tick form
// the per-RS keepalive that backs idle-group failure detection: the receiver
// updates a process-wide map of the most recently observed (epoch, tick) for
// each peer endpoint, and quiescent groups consult that map in lieu of a
// per-group election timer.
message BulkHeartbeatPB {
  optional RaftEndpointPB sender = 1;
  optional int64          epoch  = 2;
  optional int64          tick   = 3;
  repeated GroupBulkHeartbeatPB groups = 4;
}

// Bulk heartbeat acknowledgement envelope. One frame per (sender, peer) per
// inbound BulkHeartbeatPB it acks. The envelope-level (sender, epoch, tick)
// fields also serve as the follower-to-leader keepalive so the leader can
// observe per-RS liveness independently of any per-group ack.
message BulkHeartbeatAckPB {
  optional RaftEndpointPB sender = 1;
  optional int64          epoch  = 2;
  optional int64          tick   = 3;
  repeated GroupBulkHeartbeatAckPB groups = 4;
}

// Top-level frame; one per outbound flush window per peer.
message ConsensusFrame {
  enum Kind {
    BATCH_APPEND            = 1;
    BULK_HEARTBEAT          = 2;
    APPEND_SUCCESS          = 3;
    APPEND_FAILURE          = 4;
    INSTALL_SNAPSHOT        = 5;
    INSTALL_SNAPSHOT_RESP   = 6;
    VOTE_REQUEST            = 7;
    VOTE_RESPONSE           = 8;
    PRE_VOTE_REQUEST        = 9;
    PRE_VOTE_RESPONSE       = 10;
    TRIGGER_LEADER_ELECTION = 11;
    BULK_HEARTBEAT_ACK      = 12;
  }
  optional Kind kind = 1;
  optional BatchAppendEntriesPB      batch_append        = 2;
  optional BulkHeartbeatPB           bulk_heartbeat      = 3;
  optional GroupAppendSuccessPB      append_success      = 4;
  optional GroupAppendFailurePB      append_failure      = 5;
  optional InstallSnapshotRequestPB  install_request     = 6;
  optional InstallSnapshotResponsePB install_response    = 7;
  optional VoteRequestPB             vote_request        = 8;
  optional VoteResponsePB            vote_response       = 9;
  optional PreVoteRequestPB          pre_vote_request    = 10;
  optional PreVoteResponsePB         pre_vote_response   = 11;
  optional TriggerLeaderElectionPB   trigger_election    = 12;
  optional BulkHeartbeatAckPB        bulk_heartbeat_ack  = 13;
}
