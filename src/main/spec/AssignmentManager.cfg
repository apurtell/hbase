\* TLC model configuration for AssignmentManager.tla
\*
\* Primary (fast) model: 2 regions, 2 servers, nextProcId <= 5.
\* Exhaustive check completes in seconds.  Run at EVERY iteration
\* alongside AssignmentManager-sim.cfg (two-tier verification).
\* Deadlock checking is ON.  CrashConstraint ensures at least one
\* server remains online so deadlocks are genuine protocol bugs.
\*
\* See also AssignmentManager-full.cfg for ad hoc 3r/3s exhaustive checks.
\*
\* Preferred: run via MCP tool tlaplus_mcp_tlc_check (handles Java/classpath).
\* Fallback (requires Java 11+, NOT the default temurin-8):
\*   JAVA_HOME=/Library/Java/JavaVirtualMachines/temurin-17.jdk/Contents/Home
\*   $JAVA_HOME/bin/java -XX:+UseParallelGC \
\*     -cp "$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/tla2tools.jar:$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager.cfg -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2}
    Servers = {s1, s2}
    None = None

\* Symmetry reduction: regions and servers are interchangeable
SYMMETRY Symmetry

\* State constraints: bound procedure ID counter and limit crashes
CONSTRAINT
    StateConstraintSmall
    CrashConstraint

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    NoDoubleAssignment
    MetaConsistency
    LockExclusivity
    ProcedureConsistency
    RSMasterAgreement
    RSMasterAgreementConverse

\* Action property: every state change follows ValidTransition
ACTION_CONSTRAINT
    TransitionValid
