\* TLC model configuration for AssignmentManager.tla
\*
\* Small model: 3 regions, 3 servers.
\* Iteration 4: TRSP state machine for ASSIGN (master-side only).
\*
\* Run with:
\*   java -XX:+UseParallelGC -cp "tla2tools.jar:CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager.cfg -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2, r3}
    Servers = {s1, s2, s3}
    None = None

\* State constraint to bound procedure ID counter
CONSTRAINT
    StateConstraint

\* Invariants to check (all from iterations 1-4)
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    SingleAssignment
    MetaConsistency
    LockExclusivity
    ProcedureConsistency

\* Action property: every state change follows ValidTransition
ACTION_CONSTRAINT
    TransitionValid
