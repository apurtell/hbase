\* TLC simulation configuration for AssignmentManager.tla
\*
\* Simulation model: 9 regions (3 deployed + 6 unused), 3 servers.
\* Models a realistic small test cluster where 3 active regions can
\* each be split once, using 6 unused identifiers for daughters.
\*
\* 3 deployed regions tile [0, 12): r1=[0,4), r2=[4,8), r3=[8,12).
\* Each deployed region has keyspace width 4, so a split produces
\* daughters with width 2 (which cannot be re-split since 2/2=1 < 2).
\* This allows up to 3 concurrent or sequential splits, exercising
\* the parent-child procedure framework across multiple regions and
\* servers.  With UseMerge = TRUE, simulation also exercises the
\* merge procedure (MergePrepare -> MergeCheckClosed -> MergeUpdateMeta
\* -> MergeDone) and pre-PONR rollback (MergeFail), catching safety
\* violations from split/merge interactions.  The spec covers 9 modules,
\* 19 state variables, and 30 safety invariants.
\*
\* Run at EVERY iteration alongside the primary exhaustive config.
\* Together they form the two-tier safety verification strategy:
\*   1. Primary (AssignmentManager.cfg): fast exhaustive 3r/2s
\*   2. Simulation (this file): deep random traces at 9r/3s
\* A third config (AssignmentManager-liveness.cfg) checks temporal
\* liveness properties without SYMMETRY; it is not run routinely.
\*
\* TLC simulation mode generates random behaviors by performing long
\* random walks through the state graph rather than the breadth-first
\* exhaustive enumeration used in model-checking mode.  At each step
\* TLC randomly selects one enabled action from the Next disjunction,
\* producing trace depths far exceeding the exhaustive diameter (often
\* thousands of steps vs. the ~83-step exhaustive depth).  This trades
\* completeness for depth. Simulation never visits every reachable
\* state, but it efficiently reaches deeply-nested corners of the
\* state space — such as multi-crash cascades, extended retry loops,
\* and interleaved split/assign/move sequences — that are unreachable
\* by exhaustive search at this model size.  Invariants are checked at
\* every state along each trace. A violation produces a full
\* counterexample trace just as in exhaustive mode.
\*
\* This config uses MaxRetries = 2 (vs 1 in the exhaustive configs),
\* so simulation is the only tier that verifies deeper retry behavior
\* (the give-up path at retry count 2).  UseReopen = TRUE enables the
\* branch-2 REOPEN procedure (disabled in the primary exhaustive config
\* for state-space reasons).  MaxWorkers = 3 models a realistic
\* PEWorker pool for 3 servers, providing coverage of thread-pool
\* exhaustion and meta-blocking scenarios at realistic concurrency.
\*
\* Three-tier simulation durations:
\*   Per-iteration (routine):      900s   (15 min) -- feedback each iteration
\*   Post-iteration (validation):  3600s  (1 hr)   -- after completing an iteration
\*   Post-phase (milestone):       14400s (4 hr)   -- after completing a phase
\*
\* Run:
\*   /usr/bin/java -XX:+UseParallelGC \
\*     -Dtlc2.TLC.stopAfter=3600 \
\*     -cp "$HOME/.antigravity/extensions/tlaplus.vscode-ide-2026.3.120037-universal/tools/tla2tools.jar:$HOME/.antigravity/extensions/tlaplus.vscode-ide-2026.3.120037-universal/tools/CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager-sim.cfg -simulate -workers auto
\*
\*   For post-phase (4 hours):  -Dtlc2.TLC.stopAfter=14400

SPECIFICATION Spec

\* Model values
CONSTANTS
    NoServer = NoServer
    NoProcedure = NoProcedure
    NoTransition = NoTransition
    NoRange = NoRange
    NoRegion = NoRegion
    NoTable = NoTable
    \* The finite set of RegionServer identifiers participating in the model.
    Servers = {s1, s2, s3}
    \* The finite set of all region identifiers (deployed + spare for split/merge).
    Regions = {r1, r2, r3, r4, r5, r6, r7, r8, r9}
    \* Regions that exist at system start.
    DeployedRegions = {r1, r2, r3}
    \* Table identity: T1 holds deployed regions; T2 is available for CreateTable.
    Tables = {T1, T2}
    \* Upper bound of the keyspace: keys range over 0..(MaxKey-1).
    MaxKey = 12
    \* Maximum number of retries before FAILED_OPEN is reported.
    MaxRetries = 2
    \* ProcedureExecutor worker-thread pool size; bounds concurrent procedure steps.
    MaxWorkers = 3
    \* UseReopen = TRUE models branch-2's additional REOPEN procedure
    UseReopen = TRUE
    \* UseMerge = TRUE: merge enabled in simulation mode.
    \* Simulation exercises interleaved split/merge sequences at depth.
    UseMerge = TRUE
    \* UseCreate = TRUE: create enabled in simulation mode.
    UseCreate = TRUE
    \* UseDelete = TRUE: delete enabled in simulation mode.
    UseDelete = TRUE
    \* UseRSOpenDuplicateQuirk = FALSE to disable the RS duplicate-open
    \* silent-drop behavior to avoid deadlock.  Set TRUE to model the
    \* implementation quirk (AssignRegionHandler.process()).
    UseRSOpenDuplicateQuirk = FALSE
    \* UseRSCloseNotFoundQuirk = FALSE to disable the RS close-not-found
    \* silent-drop behavior to avoid deadlock.  Set TRUE to model the
    \* implementation quirk (UnassignRegionHandler.process()).
    UseRSCloseNotFoundQuirk = FALSE
    \* UseRestoreSucceedQuirk = FALSE for correct recovery behavior.
    \* Set TRUE to reproduce the OpenRegionProcedure.restoreSucceedState()
    \* bug where FAILED_OPEN reports are replayed as OPENED.
    UseRestoreSucceedQuirk = FALSE
    \* UseBlockOnMetaWrite = FALSE models master/branch-3+ behavior where
    \* procedures suspend and release the PEWorker on async meta writes.
    UseBlockOnMetaWrite = FALSE
    \* UseUnknownServerQuirk = TRUE models the existence of UNKNOWN servers
    UseUnknownServerQuirk = FALSE
    \* UseMasterAbortOnMetaWriteQuirk = FALSE: no master abort on meta write failure.
    UseMasterAbortOnMetaWriteQuirk = FALSE
    \* UseStaleStateQuirk = FALSE: no stale server state on recovery.
    UseStaleStateQuirk = FALSE

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    NoDoubleAssignment
    MetaConsistency
    LockExclusivity
    RSMasterAgreement
    RSMasterAgreementConverse
    FencingOrder
    MetaAvailableForRecovery
    NoLostRegions
    ProcStoreConsistency
    ProcStoreBijection
    ProcStepConsistency
    TargetServerConsistency
    OpeningImpliesLocation
    ClosingImpliesLocation
    ServerRegionsTrackLocation
    DispatchCorrespondance
    NoOrphanedProcedures
    NoPEWorkerDeadlock
    KeyspaceCoverage
    SplitMergeMutualExclusion
    SplitAtomicity
    NoOrphanedDaughters
    SplitCompleteness
    AtMostOneCarryingMeta
    NoOrphanedMergedRegion
    MergeCompleteness
    MergeAtomicity
    TableLockExclusivity
    DeleteTableAtomicity

\* Action property: every state change follows ValidTransition
\* and SCP progress is monotonic
ACTION_CONSTRAINT
    TransitionValid
    SCPMonotonicity

\* State constraint: bound concurrent split/merge procedures
CONSTRAINT
    SplitMergeConstraint

\* Liveness properties require symmetry to be disabled.
\* Use AssignmentManager-liveness.cfg for liveness checking.
