\* TLC simulation configuration for AssignmentManager.tla
\*
\* Simulation model: 3 regions, 3 servers, nextProcId <= 15, no crash
\* limit.  Run at EVERY iteration alongside the primary exhaustive
\* config.  Together they form the two-tier verification strategy:
\*   1. Primary (AssignmentManager.cfg): fast exhaustive 2r/2s
\*   2. Simulation (this file): deep random traces at 3r/3s
\*
\* Simulation mode randomly samples long behaviors, providing
\* probabilistic coverage of the full 3r/3s state space including
\* cascading crash scenarios and multi-cycle assign/unassign/move
\* sequences that exhaust the exhaustive budget.  Use 30s for
\* routine iteration checks; 300s for thorough pre-commit sweeps.
\*
\* Via MCP tool (override default 3s with extraJavaOpts):
\*   tlaplus_mcp_tlc_smoke with cfgFile=AssignmentManager-sim.cfg
\*     extraJavaOpts: ["-Dtlc2.TLC.stopAfter=30"]
\*
\* Via command line (adjust -Dtlc2.TLC.stopAfter for duration in seconds):
\*   JAVA_HOME=/Library/Java/JavaVirtualMachines/temurin-17.jdk/Contents/Home
\*   $JAVA_HOME/bin/java -XX:+UseParallelGC \
\*     -Dtlc2.TLC.stopAfter=30 \
\*     -cp "$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/tla2tools.jar:$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager-sim.cfg -simulate -workers auto -deadlock

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2, r3}
    Servers = {s1, s2, s3}
    None = None

\* Symmetry reduction: regions and servers are interchangeable
SYMMETRY Symmetry

\* State constraint to bound procedure ID counter (no crash limit --
\* simulation mode handles large state spaces via random sampling).
\* Uses StateConstraintDeep (<=15) for longer traces than exhaustive mode.
CONSTRAINT
    StateConstraintDeep

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    NoDoubleAssignment
    MetaConsistency
    LockExclusivity
    ProcedureConsistency
    RSMasterAgreement
    RSMasterAgreementConverse

\* Action property: every state change follows ValidTransition
ACTION_CONSTRAINT
    TransitionValid
