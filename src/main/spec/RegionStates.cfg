\* TLC model configuration for RegionStates.tla
\*
\* Small model: 2 regions, 2 servers.
\* Run with: tlc RegionStates.tla -config RegionStates.cfg

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2, r3}
    Servers = {s1, s2, s3}
    None = None

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    SingleAssignment

\* Action property: every state change follows ValidTransition
ACTION_CONSTRAINT
    TransitionValid
