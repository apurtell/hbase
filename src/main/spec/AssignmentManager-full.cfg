\* TLC model configuration for AssignmentManager.tla
\*
\* Extended (full) model: 3 regions, 3 servers, nextProcId <= 7.
\* Exhaustive 3r/3s check.  NOT run at every iteration -- reserved
\* for ad hoc on-demand checks at user-requested checkpoints.
\* CrashConstraint ensures at least one server remains online so
\* deadlock checking can find genuine protocol bugs.  Cascading crash
\* scenarios (all servers down) are covered by the simulation config.
\*
\* See also AssignmentManager.cfg for the primary (fast) 2r/2s model.
\*
\* Requires Java 11+:
\*   JAVA_HOME=/Library/Java/JavaVirtualMachines/temurin-17.jdk/Contents/Home
\*   $JAVA_HOME/bin/java -XX:+UseParallelGC \
\*     -cp "$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/tla2tools.jar:$HOME/.cursor/extensions/tlaplus.vscode-ide-2026.2.250046-universal/tools/CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager-full.cfg -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2, r3}
    Servers = {s1, s2, s3}
    None = None

\* Symmetry reduction: regions and servers are interchangeable
SYMMETRY Symmetry

\* State constraints: bound procedure ID counter and limit crashes
CONSTRAINT
    StateConstraint
    CrashConstraint

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    NoDoubleAssignment
    MetaConsistency
    LockExclusivity
    ProcedureConsistency
    RSMasterAgreement
    RSMasterAgreementConverse

\* Action property: every state change follows ValidTransition
ACTION_CONSTRAINT
    TransitionValid
