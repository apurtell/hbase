\* TLC model configuration for AssignmentManager.tla
\*
\* Extended (full) model: 3 regions, 3 servers.
\* Exhaustive 3r/3s check.  NOT run at every iteration -- reserved
\* for ad hoc on-demand checks at user-requested checkpoints.
\* ServerRestart + WF ensures crashed servers eventually come back
\* online, so no CrashConstraint is needed.  Multi-crash and
\* all-crashed scenarios are explored exhaustively.
\*
\* The state space is naturally finite with region-keyed procedures
\* (no StateConstraint on a procedure ID counter is needed).
\*
\* See also AssignmentManager.cfg for the primary (fast) 2r/2s model.
\*
\* Fallback:
\*   /usr/bin/java -XX:+UseParallelGC \
\*     -cp "$HOME/.antigravity/extensions/tlaplus.vscode-ide-2026.3.22149-universal/tools/tla2tools.jar:$HOME/.antigravity/extensions/tlaplus.vscode-ide-2026.3.22149-universal/tools/CommunityModules-deps.jar" \
\*     tlc2.TLC AssignmentManager.tla -config AssignmentManager-full.cfg -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    Regions = {r1, r2, r3}
    Servers = {s1, s2, s3}
    NoServer = NoServer
    NoProcedure = NoProcedure
    NoTransition = NoTransition
    MaxRetries = 1
    \* UseReopen = TRUE models branch-2's additional REOPEN procedure
    UseReopen = TRUE
    \* UseRSOpenDuplicateQuirk = FALSE to disable the RS duplicate-open
    \* silent-drop behavior to avoid deadlock.  Set TRUE to model the
    \* implementation quirk (AssignRegionHandler.process()).
    UseRSOpenDuplicateQuirk = FALSE
    \* UseRestoreSucceedQuirk = FALSE for correct recovery behavior.
    \* Set TRUE to reproduce the OpenRegionProcedure.restoreSucceedState()
    \* bug where FAILED_OPEN reports are replayed as OPENED.
    UseRestoreSucceedQuirk = FALSE

\* Symmetry reduction: regions and servers are interchangeable
SYMMETRY Symmetry

\* Invariants to check
INVARIANT
    TypeOK
    OpenImpliesLocation
    OfflineImpliesNoLocation
    NoDoubleAssignment
    MetaConsistency
    LockExclusivity
    RSMasterAgreement
    RSMasterAgreementConverse
    FencingOrder
    MetaAvailableForRecovery
    NoLostRegions
    ProcStoreConsistency
    ProcStoreBijection
    ProcStepConsistency
    TargetServerConsistency
    OpeningImpliesLocation
    ClosingImpliesLocation
    ServerRegionsTrackLocation
    DispatchCorrespondance
    NoOrphanedProcedures

\* Action property: every state change follows ValidTransition
\* and SCP progress is monotonic
ACTION_CONSTRAINT
    TransitionValid
    SCPMonotonicity
