SPECIFICATION SpecLive

CONSTANTS
    p1 = p1
    p2 = p2
    Producers <- MC_Producers
    ControlBatchCap = 2
    BulkBatchCap = 2
    ServiceCost = 1
    MaxClock = 14
    MaxEnqueues = 4
    L = 2

CONSTRAINT MaxClockHonoursDrain
CONSTRAINT EnqueueHonoursHorizon

\* No SYMMETRY: TLC liveness checking is incompatible with symmetry reduction.

INVARIANTS
    TypeOK
    DrainLatchConsistent
    MailboxFifoOK
    PerPassCapsHonored
    NoControlInversion
    NoBulkInversion
    NoSpontaneousTasks
    BoundedControlLatency

PROPERTIES
    EventualDelivery
    MailboxFairness

CHECK_DEADLOCK FALSE
