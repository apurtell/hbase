\* This config is intentionally identical to MCRaftRegionReplica.cfg.
\* All election-domain differences (MaxSeqId=1, etc.) are encoded in
\* the .tla file's constant definitions.  Keeping a separate config
\* provides a distinct name for TLC invocation and log output.
SPECIFICATION Spec

CONSTANTS
    m1 = m1
    m2 = m2
    m3 = m3
    NoVote = NoVote
    Members <- MC_Members
    None <- MC_None
    MaxTerm <- MC_MaxTerm
    LeaderLeaseDuration <- MC_LeaderLeaseDuration
    ElectionTimeoutMin <- MC_ElectionTimeoutMin
    MaxClockDrift <- MC_MaxClockDrift
    MaxClock <- MC_MaxClock
    MaxSeqId <- MC_MaxSeqId

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    LeaderUniqueness
    LeaseImpliesLeadership
    LeaseExpiresBeforeElection
    CatchUpDataIntegrity
    WriteBarrierSafety
    FollowerSeqIdConsistency
    NoOrphanMemstoreDrop
    FlushDropBoundary
    FollowerFlushMemstoreDrop
    HFilesBeforeFlushMarker
    PromotionReadWriteGuard
    PromotionMVCCContinuity
    CatchUpCompleteness

CHECK_DEADLOCK FALSE
