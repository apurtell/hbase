SPECIFICATION SpecLive

CONSTANTS
    p1 = p1
    p2 = p2
    Producers <- MC_Producers
    TickPeriod = 1
    FlushDeadline = 3
    DrainCost = 1
    MaxClock = 10
    MaxEnqueues = 3
    L = 2

CONSTRAINT MaxClockHonoursDrain
CONSTRAINT EnqueueHonoursHorizon

\* No SYMMETRY: TLC liveness checking is incompatible with symmetry reduction.

INVARIANTS
    TypeOK
    DrainLatchConsistent
    MailboxFifoOK
    NoFrameInversion
    NoSpontaneousFrames
    BoundedDeliveryLatency

PROPERTY
    EventualDelivery

CHECK_DEADLOCK FALSE
