SPECIFICATION Spec

CONSTANTS
    m1 = m1
    m2 = m2
    m3 = m3
    NoVote = NoVote
    Members <- MC_Members
    None <- MC_None
    MaxTerm <- MC_MaxTerm
    LeaderLeaseDuration <- MC_LeaderLeaseDuration
    ElectionTimeoutMin <- MC_ElectionTimeoutMin
    MaxClockDrift <- MC_MaxClockDrift
    MaxClock <- MC_MaxClock
    MaxSeqId <- MC_MaxSeqId

SYMMETRY Symmetry

\* No-correlated-loss assumption — see RaftRegionReplica.tla header. Used as a
\* state CONSTRAINT (not an INVARIANT): TLC prunes states where the lazy
\* commit-then-fsync interleaving would have allowed a committed entry to be
\* unfsynced on a majority. Within the pruned state space, every other
\* safety invariant must still hold.
CONSTRAINT NoCorrelatedUnfsyncedMajorityLoss

INVARIANTS
    TypeOK
    LeaderUniqueness
    LeaseImpliesLeadership
    LeaseExpiresBeforeElection
    CatchUpDataIntegrity
    NoFollowerExposureRollback
    WriteBarrierSafety
    FollowerSeqIdConsistency
    NoOrphanMemstoreDrop
    FlushDropBoundary
    FollowerFlushMemstoreDrop
    HFilesBeforeFlushMarker
    PromotionReadWriteGuard
    PromotionMVCCContinuity
    CatchUpCompleteness
    QuiesceImpliesAllAcked
    QuiesceImpliesNoPendingWrite
    QuiesceImpliesIdleFlush
    QuiesceImpliesTermConsistency
    WakeBeforePropose

CHECK_DEADLOCK FALSE
